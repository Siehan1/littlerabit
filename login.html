<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Literrabit | login</title>\
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <a href="index.html"><img src="./src/close.svg" alt="" class="close-login"></a>
        <div class="container-login">
            <h1>Masuk</h1>
            <div class="input-box">
                <input type="email" placeholder="email atau nama pengguna" required class="email">
            </div>
            <div class="input-box">
                <input type="Password" name="password" id="password" placeholder="kata sandi">
                <img src="./src/visibility_off.svg" alt="" id="eyeicon">
            </div>
            <button class="primary-btn" id="loginBtn">Masuk</button>
            <div class="pemisah">
                <div class="line"></div>
                <h2>Atau</h2>
                <div class="line"></div>
            </div>
            <div class="secondary-btn">
                <a href="register.html"><button>Daftar</button></a>
            </div>
        </div>
    </div>

    <div id="custom-alert" class="alert-box">
        <div class="alert-content">
            <p id="alert-message">Pesan alert di sini</p>
            <button id="alert-ok">OK</button>
        </div>
    </div>



    <script src="./script.js"></script>
</body>
</html>
