<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Buku - Literabit</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="quiz-buku">
      <section class="overlap-group-wrapper">
        <div class="overlap-group">
          <div class="overlap">
            <div class="content">
              <img class="tak" src="./src/quiz1.svg" alt="Decorative illustration" />
              <p class="masuk-dan-tunjukkan">Masuk dan tunjukkan kalau kamu bisa jadi juara di kuis Literabit!</p>
            </div>
            <div class="cta-container">
              <button class="cta-button">
                <span class="cta-text">Siap Bermain</span>
              </button>
            </div>
          </div>
          <h1 class="mari-bermain-bersama">Mari Bermain<br />Bersama &gt;&lt;</h1>
          <img class="group" src="./src/x.svg" alt="Decorative group icon" />
        </div>
      </section>
    </main>
  </body>
</html>
